# GitHub actions workflow file for env - prod

# Apply workflow can ONLY be triggered when a pull request is merged into main --> i.e. ONLY after prvalidation is manually APPROVED

# -----------------------------------------------------------

name: "Terraform init, fmt, plan and apply for provisioning infra in env - prod"

on:
  push:
    branches:
      - main
    paths:              # it should only run when something that affects the prod env changes
      - "env/prod/**"
      - "modules/**"

permissions:
  id-token: write
  contents: read

env:
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_USE_OIDC: true
  ARM_SKIP_PROVIDER_REGISTRATION: true

jobs:
  terraform-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: env/prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # no backend config is mentioned - so it will use backend.tf as config
      # actual backend values are passed here as secrets
      - name: Terraform Init (Backend Injection)
        run: |
          terraform init -upgrade \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=env-prod-cli.tfstate" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform Format
        run: terraform fmt -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (save output)
        run: terraform plan -var-file="prod.tfvars" -out=tfplan

      - name: Terraform Apply         # auto approve is safe as pr-validation is approved
        run: terraform apply -auto-approve tfplan   # makes sure approved plan is applied


